services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trader_intelligence
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
